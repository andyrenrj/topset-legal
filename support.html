<p>如有任何问题、建议或需要帮助，请通过电子邮件联系：<a href="mailto:andyrenrj@taigang.club">andyrenrj@taigang.club</a>。我们会尽快回复。</p>

<h2>常见问题</h2>
<ul>
  <li><strong>如何登录？</strong>支持使用邮箱+密码，或 Sign in with Apple。</li>
  <li><strong>忘记密码？</strong>在登录页点击“忘记密码”，通过邮箱验证码重置。</li>
  <li><strong>如何删除账号？</strong>在应用内“我的 → 账号与安全”中可删除账号，相关数据将被清除。</li>
  <li><strong>训练数据没同步？</strong>请检查网络连接；离线记录会在恢复网络后自动同步。</li>
</ul>
